name: topdown-screen

# 2026-07-13完全移行: 実行対象を main_topdown.py(新スクリーニング: 地合い×セクター×カタリスト痕跡)に切替。
# 旧3システム(main_all.py / main.py / main_momentum.py)はコード温存・実行対象外(削除しない)。

on:
  schedule:
    - cron: "30 22 * * 0-4"   # 7:30 JST 月〜金
  workflow_dispatch:
    inputs:
      dryrun:
        description: "SCREEN_DRYRUN (合成データで配信テスト)"
        default: "0"

permissions:
  contents: write   # 棄却台帳・positionsの永続化コミット用

concurrency:
  group: screen
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Japanese fonts (Noto Sans CJK JP)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run topdown screening
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.WORKER_AUTH_TOKEN }}
          ACCOUNT_EQUITY: ${{ vars.ACCOUNT_EQUITY }}
          SCREEN_DRYRUN: ${{ github.event.inputs.dryrun || '0' }}
          REQUIRE_LINE_DELIVERY: "0"
        run: python main_topdown.py

      - name: Persist ledgers (topdown reject ledger, result template, positions)
        if: always()
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add out_topdown/topdown_reject_ledger.csv out_topdown/topdown_result_log_template.csv \
                  positions_topdown.csv || true
          git diff --cached --quiet || git commit -m "topdown ledger: $(date -u +%F)"
          git push || echo "push skipped"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_id }}
          path: out_topdown/
          retention-days: 30

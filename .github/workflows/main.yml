name: stockbotTOM

on:
  workflow_dispatch:
  schedule:
    - cron: '27 23 * * *'  # 08:27 JST

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          WORKER_URL: ${{ secrets.WORKER_URL || vars.WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.WORKER_AUTH_TOKEN || secrets.UPLOAD_TOKEN || secrets.AUTH_TOKEN || secrets.PUSH_TOKEN || vars.WORKER_AUTH_TOKEN || vars.UPLOAD_TOKEN || vars.AUTH_TOKEN || vars.PUSH_TOKEN }}
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN || secrets.WORKER_AUTH_TOKEN || secrets.AUTH_TOKEN || vars.UPLOAD_TOKEN || vars.WORKER_AUTH_TOKEN || vars.AUTH_TOKEN }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN || secrets.WORKER_AUTH_TOKEN || secrets.UPLOAD_TOKEN || vars.AUTH_TOKEN || vars.WORKER_AUTH_TOKEN || vars.UPLOAD_TOKEN }}
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN || secrets.WORKER_AUTH_TOKEN || vars.PUSH_TOKEN || vars.WORKER_AUTH_TOKEN }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN || secrets.LINE_CHANNEL_ACCESS_TOKEN || secrets.LINE_ACCESS_TOKEN || vars.LINE_TOKEN || vars.LINE_CHANNEL_ACCESS_TOKEN || vars.LINE_ACCESS_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN || secrets.LINE_TOKEN || secrets.LINE_ACCESS_TOKEN || vars.LINE_CHANNEL_ACCESS_TOKEN || vars.LINE_TOKEN || vars.LINE_ACCESS_TOKEN }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN || secrets.LINE_CHANNEL_ACCESS_TOKEN || secrets.LINE_TOKEN || vars.LINE_ACCESS_TOKEN || vars.LINE_CHANNEL_ACCESS_TOKEN || vars.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID || secrets.LINE_TO || secrets.LINE_TARGET_ID || vars.LINE_USER_ID || vars.LINE_TO || vars.LINE_TARGET_ID }}
          LINE_TO: ${{ secrets.LINE_TO || secrets.LINE_USER_ID || secrets.LINE_TARGET_ID || vars.LINE_TO || vars.LINE_USER_ID || vars.LINE_TARGET_ID }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID || secrets.LINE_USER_ID || secrets.LINE_TO || vars.LINE_TARGET_ID || vars.LINE_USER_ID || vars.LINE_TO }}
          LINE_SEND_IMAGE: ${{ vars.LINE_SEND_IMAGE || '1' }}
          REQUIRE_LINE_DELIVERY: ${{ vars.REQUIRE_LINE_DELIVERY || '0' }}
          REQUIRE_LINE_IMAGES: ${{ vars.REQUIRE_LINE_IMAGES || '0' }}
        run: python main.py

      - name: Upload out artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: out/**
          if-no-files-found: warn
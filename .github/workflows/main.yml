name: mispricing-screen

on:
  schedule:
    - cron: "30 22 * * 0-4"   # 7:30 JST 月〜金
  workflow_dispatch:
    inputs:
      dryrun:
        description: "SCREEN_DRYRUN (合成データで配信テスト)"
        default: "0"

permissions:
  contents: write   # out/ の棄却台帳をコミットで永続化するため

concurrency:
  group: screen
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Japanese fonts (Noto Sans CJK JP)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run screening
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.WORKER_AUTH_TOKEN }}
          ACCOUNT_EQUITY: ${{ vars.ACCOUNT_EQUITY }}
          NIKKEI_VI_VALUE: ${{ vars.NIKKEI_VI_VALUE }}
          SCREEN_DRYRUN: ${{ github.event.inputs.dryrun || '0' }}
          REQUIRE_LINE_DELIVERY: "0"
        run: python main.py

      - name: Persist ledgers (reject_ledger etc.)
        if: always()
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add out/reject_ledger.csv out/result_log_template.csv || true
          git diff --cached --quiet || git commit -m "ledger: $(date -u +%F)"
          git push || echo "push skipped"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_id }}
          path: out/
          retention-days: 30
